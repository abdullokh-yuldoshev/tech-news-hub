<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALLY? | Живая Лента Технологий</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-color: #0a1128; --card-bg: #001f54; --card-border: #034078; --accent: #034078; --text-main: #dce1de; --text-muted: rgba(220, 225, 222, 0.65); --glow: rgba(3, 64, 120, 0.4); --btn-text: #dce1de; }
        body.theme-light { --bg-color: #1f2421; --card-bg: rgba(33, 104, 105, 0.2); --card-border: #216869; --accent: #49a078; --text-main: #dce1de; --text-muted: #9cc5a1; --glow: rgba(73, 160, 120, 0.4); --btn-text: #1f2421; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease; }
        .app-card { background-color: var(--card-bg); border: 1px solid var(--card-border); transition: all 0.3s ease; }
        .app-card:hover { border-color: var(--text-muted); box-shadow: 0 15px 30px -10px var(--glow); }
        .filter-btn { border: 1px solid var(--card-border); color: var(--text-muted); padding: 8px 18px; border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .filter-btn.active { background-color: var(--accent); border-color: var(--accent); color: var(--btn-text); }
        .hero-slide { transition: opacity 0.6s ease-in-out; }
    </style>
</head>
<body class="min-h-screen"> 

    <header class="sticky top-0 z-50 backdrop-blur-md bg-[var(--bg-color)]/90 border-b border-[var(--card-border)]">
        <div class="max-w-7xl px-6 mx-auto h-20 flex items-center justify-between">
            <a href="#" class="flex items-center space-x-2" onclick="location.reload()">
                <div class="w-10 h-10 bg-[var(--accent)] rounded-xl flex items-center justify-center font-bold">?</div>
                <span class="text-2xl font-extrabold">REALLY<span class="text-[var(--accent)]">?</span></span>
            </a>
            <div class="flex items-center space-x-3">
                <button onclick="changeLanguage('ru')" id="btn-ru" class="px-3 py-1 rounded-lg text-xs font-bold bg-[var(--accent)]">RU</button>
                <button onclick="changeLanguage('en')" id="btn-en" class="px-3 py-1 rounded-lg text-xs font-bold text-gray-400">EN</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl px-6 mx-auto py-8">
        <div id="loader" class="text-center py-20">Загрузка...</div>

        <!-- HERO -->
        <section id="hero-section" class="mb-12 relative w-full h-[450px] rounded-3xl overflow-hidden hidden shadow-2xl border border-[var(--card-border)]">
            <div id="hero-slides" class="relative w-full h-full"></div>
            <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex space-x-2 z-20" id="hero-dots"></div>
        </section>

        <!-- FILTERS -->
        <div id="content-section" class="hidden space-y-6">
            <div class="flex flex-wrap gap-2" id="time-filters">
                <button onclick="setFilter('time', 'all')" class="filter-btn active" id="time-all">Все</button>
                <button onclick="setFilter('time', 'today')" class="filter-btn" id="time-today">Сегодня</button>
                <button onclick="setFilter('time', 'yesterday')" class="filter-btn" id="time-yesterday">Вчера</button>
            </div>
            <div class="flex flex-wrap gap-2" id="cat-filters">
                <button onclick="setFilter('cat', 'all')" class="filter-btn active" id="cat-all">Все</button>
                <button onclick="setFilter('cat', 'ai')" class="filter-btn" id="cat-ai">ИИ</button>
                <button onclick="setFilter('cat', 'gadgets')" class="filter-btn" id="cat-gadgets">Гаджеты</button>
                <button onclick="setFilter('cat', 'software')" class="filter-btn" id="cat-software">Софт</button>
                <button onclick="setFilter('cat', 'games')" class="filter-btn" id="cat-games">Игры</button>
                <button onclick="setFilter('cat', 'business')" class="filter-btn" id="cat-business">Бизнес</button>
            </div>

            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            <div id="load-more-container" class="flex justify-center mt-12 hidden">
                <button onclick="renderBatch()" id="btn-more" class="px-8 py-3 bg-[var(--accent)] rounded-xl font-bold">Показать еще ↓</button>
            </div>
        </div>
    </main>

    <script>
        let allNews = [], filteredNews = [], currentLang = 'ru', currentStep = 0, heroIdx = 0, timeF = 'all', catF = 'all';
        const STEP = 9;

        const cats = {
            ai: ['ai', 'ии', 'нейросеть', 'gpt', 'llm', 'gemini', 'openai'],
            gadgets: ['smartphone', 'phone', 'iphone', 'samsung', 'ноутбук', 'laptop', 'macbook', 'gadget'],
            software: ['софт', 'software', 'app', 'ios', 'android', 'windows'],
            games: ['game', 'игра', 'игры', 'playstation', 'xbox', 'steam', 'gta'],
            business: ['бизнес', 'business', 'crypto', 'крипта', 'startup', 'стартап', 'ipo']
        };

        async function fetchNews() {
            try {
                const res = await fetch(`/api/news?lang=${currentLang}&t=${Date.now()}`);
                const xml = await res.text();
                const items = [];
                const regex = /<(?:item|entry)>([\s\S]*?)<\/(?:item|entry)>/gi;
                let match;
                while ((match = regex.exec(xml)) !== null) {
                    const s = match[1];
                    const title = (s.match(/<title[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/title>/i) || [])[1]?.replace(/<[^>]+>/g, '').trim() || "Без названия";
                    const link = (s.match(/<link[^>]*href=["']([^"']+)["']/i) || s.match(/<link>(.*?)<\/link>/i) || [])[1] || "#";
                    const img = (s.match(/<media:(?:content|thumbnail)[^>]*\burl=["']([^"']+)["']/i) || s.match(/<img[^>]*\bsrc=["']([^"']+)["']/i) || [])[1] || "";
                    const date = new Date((s.match(/<(?:pubDate|published|updated)>(.*?)<\/(?:pubDate|published|updated)>/i) || [])[1] || Date.now());
                    
                    items.push({ 
                        title, link, img, date, 
                        dateStr: date.toLocaleDateString(),
                        timeCat: (new Date().toDateString() === date.toDateString() ? 'today' : 'yesterday'), 
                        search: (title + s).toLowerCase() 
                    });
                }
                allNews = items.sort((a, b) => b.date - a.date);
                initUI();
            } catch(e) { document.getElementById('loader').innerText = "Ошибка загрузки"; }
        }

        function initUI() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('hero-section').classList.remove('hidden');
            document.getElementById('content-section').classList.remove('hidden');
            renderHero();
            applyFilters();
        }

        function renderHero() {
            const cont = document.getElementById('hero-slides');
            const dots = document.getElementById('hero-dots');
            allNews.slice(0, 5).forEach((n, i) => {
                cont.innerHTML += `<a href="${n.link}" target="_blank" class="hero-slide ${i===0?'active':'inactive'} absolute w-full h-full bg-cover bg-center cursor-pointer block" style="background-image:url('${n.img}')">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0a1128] to-transparent flex items-end p-12">
                        <div><span class="bg-[var(--accent)] px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Топ новость</span><h2 class="text-3xl font-black text-white mt-2">${n.title}</h2></div>
                    </div>
                </a>`;
                dots.innerHTML += `<button onclick="heroIdx=${i}; updateHero();" class="w-3 h-3 rounded-full bg-white/50"></button>`;
            });
            setInterval(() => { heroIdx = (heroIdx + 1) % 5; updateHero(); }, 5000);
        }

        function updateHero() {
            document.querySelectorAll('.hero-slide').forEach((s, i) => s.classList.toggle('active', i === heroIdx));
            document.querySelectorAll('.hero-slide').forEach((s, i) => s.classList.toggle('inactive', i !== heroIdx));
        }

        function setFilter(type, val) {
            if(type === 'time') timeF = val; else catF = val;
            applyFilters();
        }

        function applyFilters() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`time-${timeF}`).classList.add('active');
            document.getElementById(`cat-${catF}`).classList.add('active');
            
            filteredNews = allNews.filter(n => {
                const t = (timeF === 'all' || n.timeCat === timeF);
                const c = (catF === 'all' || (cats[catF] && cats[catF].some(k => n.search.includes(k))));
                return t && c;
            });
            currentStep = 0;
            document.getElementById('news-grid').innerHTML = '';
            renderBatch();
        }

        function renderBatch() {
            const grid = document.getElementById('news-grid');
            const batch = filteredNews.slice(currentStep, currentStep + STEP);
            batch.forEach(n => {
                grid.innerHTML += `<article class="app-card rounded-2xl overflow-hidden" onclick="window.open('${n.link}', '_blank')">
                    <div class="h-48 bg-gray-800">${n.img ? `<img src="${n.img}" class="w-full h-full object-cover">` : ''}</div>
                    <div class="p-6 cursor-pointer">
                        <span class="text-xs text-gray-400 font-mono">${n.dateStr}</span>
                        <h3 class="font-bold mt-2">${n.title}</h3>
                    </div>
                </article>`;
            });
            currentStep += STEP;
            document.getElementById('load-more-container').classList.toggle('hidden', currentStep >= filteredNews.length);
            const btn = document.getElementById('btn-more');
            btn.innerText = (currentStep >= filteredNews.length) ? "Больше нет" : "Показать еще ↓";
            btn.disabled = (currentStep >= filteredNews.length);
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('btn-ru').classList.toggle('bg-[#034078]', lang==='ru');
            document.getElementById('btn-en').classList.toggle('bg-[#034078]', lang==='en');
            fetchNews();
        }

        window.onload = fetchNews;
    </script>
</body>
</html>
