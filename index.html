<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALLY? | Живая Лента Технологий</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #001f54;
            --card-border: #034078;
            --accent: #034078;
            --text-main: #dce1de;
            --text-muted: rgba(220, 225, 222, 0.65); 
            --glow: rgba(3, 64, 120, 0.4);
            --btn-text: #dce1de;
        }
        body.theme-light {
            --bg-color: #1f2421;
            --card-bg: rgba(33, 104, 105, 0.2);
            --card-border: #216869;
            --accent: #49a078;
            --text-main: #dce1de;
            --text-muted: #9cc5a1;
            --glow: rgba(73, 160, 120, 0.4);
            --btn-text: #1f2421;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        
        .app-navbar { background-color: var(--bg-color); border-bottom: 1px solid var(--card-border); opacity: 0.98; }
        .app-card { background-color: var(--card-bg); border: 1px solid var(--card-border); transition: all 0.3s ease; }
        .app-card:hover { border-color: var(--text-muted); box-shadow: 0 15px 30px -10px var(--glow); transform: translateY(-4px); }
        .bg-accent { background-color: var(--accent); color: var(--btn-text); }
        .filter-btn { border: 1px solid var(--card-border); color: var(--text-muted); padding: 6px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; transition: all 0.3s; cursor: pointer; white-space: nowrap; }
        .filter-btn:hover { border-color: var(--text-main); color: var(--text-main); }
        .filter-btn.active { background-color: var(--accent); border-color: var(--accent); color: var(--btn-text); }
        .placeholder-bg { background: linear-gradient(to bottom right, var(--bg-color), var(--card-border)); }
        .tech-card { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        
        .hero-slide { transition: opacity 0.8s ease-in-out; }
        .hero-slide.active { opacity: 1; z-index: 10; pointer-events: auto; }
        .hero-slide.inactive { opacity: 0; z-index: 0; pointer-events: none; }
        .dot { transition: all 0.3s ease; }
        .dot.active { background-color: var(--text-main); width: 24px; }
    </style>
</head>
<body class="min-h-screen"> 

    <header class="sticky top-0 z-50 backdrop-blur-md app-navbar">
        <div class="max-w-7xl px-4 sm:px-6 lg:px-8 mx-auto h-20 flex items-center justify-between">
            <a href="#" class="flex items-center space-x-2 group" onclick="location.reload()">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                    <span class="code-font font-bold text-xl text-[var(--btn-text)]">?</span>
                </div>
                <span class="text-2xl font-extrabold tracking-tight">REALLY<span class="text-accent">?</span></span>
            </a>
            <div class="flex items-center space-x-3">
                <button onclick="toggleTheme()" class="app-card rounded-xl p-2 text-sm hover:opacity-80 transition-all" id="theme-toggle-btn">🌙</button>
                <div class="app-card rounded-xl p-1 flex">
                    <button id="btn-ru" onclick="changeLanguage('ru')" class="px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent">RU</button>
                    <button id="btn-en" onclick="changeLanguage('en')" class="px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl px-4 sm:px-6 lg:px-8 mx-auto py-8">
        <div id="loader-list" class="text-center py-20 text-muted code-font text-lg">Загрузка...</div>

        <!-- HERO -->
        <section id="hero-section" class="mb-12 relative w-full h-[400px] md:h-[500px] rounded-3xl overflow-hidden hidden shadow-2xl border border-custom group">
            <div id="hero-slides-container" class="w-full h-full relative"></div>
            <div id="hero-dots" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex space-x-2 z-20"></div>
            <button onclick="prevHero(); event.stopPropagation();" class="absolute left-4 top-1/2 z-20 bg-black/50 text-white w-10 h-10 rounded-full hover:bg-[var(--accent)] backdrop-blur-md">←</button>
            <button onclick="nextHero(); event.stopPropagation();" class="absolute right-4 top-1/2 z-20 bg-black/50 text-white w-10 h-10 rounded-full hover:bg-[var(--accent)] backdrop-blur-md">→</button>
        </section>

        <!-- НАВИГАЦИЯ (РАЗДЕЛЬНАЯ) -->
        <div id="content-section" class="hidden space-y-6">
            <h2 class="text-2xl font-extrabold tracking-tight flex items-center gap-2">
                <span class="w-2 h-6 bg-accent rounded-full transition-colors"></span> Лента новостей
            </h2>
            
            <!-- РЯД 1: ВРЕМЯ -->
            <div class="flex space-x-2 overflow-x-auto pb-2 scrollbar-hide" id="time-filters-container">
                <button onclick="applyFilters('time', 'all')" id="time-all" class="filter-btn active">Все</button>
                <button onclick="applyFilters('time', 'today')" id="time-today" class="filter-btn">Сегодня</button>
                <button onclick="applyFilters('time', 'yesterday')" id="filter-yesterday" class="filter-btn">Вчера</button>
            </div>
            
            <!-- РЯД 2: КАТЕГОРИИ -->
            <div class="flex space-x-2 overflow-x-auto pb-2 scrollbar-hide" id="cat-filters-container">
                <button onclick="applyFilters('cat', 'all')" id="cat-all" class="filter-btn active">Все</button>
                <button onclick="applyFilters('cat', 'ai')" id="cat-ai" class="filter-btn">ИИ</button>
                <button onclick="applyFilters('cat', 'gadgets')" id="cat-gadgets" class="filter-btn">Гаджеты</button>
                <button onclick="applyFilters('cat', 'software')" id="cat-software" class="filter-btn">Софт</button>
                <button onclick="applyFilters('cat', 'games')" id="cat-games" class="filter-btn">Игры</button>
                <button onclick="applyFilters('cat', 'business')" id="cat-business" class="filter-btn">Бизнес</button>
            </div>
            
            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

            <div id="load-more-container" class="flex justify-center mt-12 mb-8 hidden">
                <button onclick="renderNextBatch()" id="btn-load-more" class="app-card font-bold px-8 py-3 rounded-xl hover:bg-[var(--accent)] transition-all">Показать еще ↓</button>
            </div>
        </div>
    </main>

    <footer class="border-t border-custom mt-12 text-muted text-sm py-8 text-center"><p id="txt-footer"></p></footer>

    <script>
        let currentLang = 'ru';
        let allNewsItems = []; 
        let filteredNewsItems = [];
        let timeFilter = 'all';
        let catFilter = 'all';
        let currentRenderIndex = 0;
        const RENDER_BATCH_SIZE = 9;

        const dict = {
            ru: { footer: `© ${new Date().getFullYear()} REALLY?`, loading: 'Загрузка...', btnLoadMore: 'Показать еще ↓', noMoreNews: 'Больше новостей нет', empty: 'Ничего не найдено' },
            en: { footer: `© ${new Date().getFullYear()} REALLY?`, loading: 'Loading...', btnLoadMore: 'Load more ↓', noMoreNews: 'No more news', empty: 'Nothing found' }
        };

        const categoryKeywords = {
            ai: ['ai', 'ии', 'нейросеть', 'gpt', 'llm', 'gemini', 'openai', 'artificial intelligence'],
            gadgets: ['смартфон', 'phone', 'iphone', 'samsung', 'ноутбук', 'laptop', 'macbook', 'gadget', 'гаджет'],
            software: ['софт', 'приложение', 'app', 'software', 'ios', 'android', 'windows'],
            games: ['game', 'игра', 'игры', 'playstation', 'xbox', 'nintendo', 'steam', 'gta'],
            business: ['бизнес', 'business', 'crypto', 'крипта', 'startup', 'стартап', 'ipo', 'инвестиции']
        };

        function applyFilters(type, value) {
            if(type === 'time') timeFilter = value;
            if(type === 'cat') catFilter = value;

            // Подсветка кнопок
            document.querySelectorAll('#time-filters-container .filter-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#cat-filters-container .filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`time-${timeFilter}`).classList.add('active');
            document.getElementById(`cat-${catFilter}`).classList.add('active');

            // Логика фильтрации
            filteredNewsItems = allNewsItems.filter(item => {
                const matchTime = (timeFilter === 'all' || item.timeCat === timeFilter);
                const matchCat = (catFilter === 'all' || (catFilter !== 'all' && categoryKeywords[catFilter].some(kw => item.searchString.includes(kw))));
                return matchTime && matchCat;
            });

            currentRenderIndex = 0;
            document.getElementById('news-grid').innerHTML = '';
            renderNextBatch();
        }

        async function fetchNews() {
            try {
                const res = await fetch(`/api/news?lang=${currentLang}&t=${Date.now()}`);
                const xmlText = await res.text();
                const rawItems = parseXML(xmlText);
                
                allNewsItems = rawItems.map(item => {
                    const date = new Date(item.pubDate);
                    const isToday = date.toDateString() === new Date().toDateString();
                    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
                    const isYesterday = date.toDateString() === yesterday.toDateString();
                    
                    return { ...item, timeCat: isToday ? 'today' : (isYesterday ? 'yesterday' : 'older'), timestamp: date.getTime() };
                });
                
                allNewsItems.sort((a,b) => b.timestamp - a.timestamp);
                
                // Hero
                heroItems = allNewsItems.slice(0, 5);
                buildHeroBanner();
                
                applyFilters('all', 'all');
                document.getElementById('loader-list').classList.add('hidden');
                document.getElementById('hero-section').classList.remove('hidden');
                document.getElementById('content-section').classList.remove('hidden');
            } catch(e) { document.getElementById('loader-list').innerText = "Ошибка загрузки"; }
        }

        // ВАЖНО: Парсер теперь берет до 100 новостей для ленты
        function parseXML(xmlStr) {
            const items = [];
            const itemRegex = /<(?:item|entry)>([\s\S]*?)<\/(?:item|entry)>/gi;
            let match;
            while ((match = itemRegex.exec(xmlStr)) !== null && items.length < 100) {
                const itemStr = match[1];
                const title = (itemStr.match(/<title[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/title>/i) || [])[1] || "Без названия";
                const imgMatch = itemStr.match(/<media:(?:content|thumbnail)[^>]*\burl=["']([^"']+)["']/i) || itemStr.match(/<enclosure[^>]*\burl=["']([^"']+)["']/i) || itemStr.match(/<img[^>]*\bsrc=["']([^"']+)["']/i);
                
                items.push({
                    title: title.replace(/<[^>]+>/g, '').trim(),
                    link: (itemStr.match(/<link[^>]*href=["']([^"']+)["']/i) || itemStr.match(/<link>(.*?)<\/link>/i) || [])[1] || "#",
                    img: imgMatch ? imgMatch[1].replace(/&amp;/g, '&') : "",
                    pubDate: (itemStr.match(/<(?:pubDate|published|updated)>(.*?)<\/(?:pubDate|published|updated)>/i) || [])[1] || "",
                    searchString: itemStr.toLowerCase()
                });
            }
            return items;
        }

        function renderNextBatch() {
            const grid = document.getElementById('news-grid');
            const batch = filteredNewsItems.slice(currentRenderIndex, currentRenderIndex + RENDER_BATCH_SIZE);
            batch.forEach(news => {
                grid.innerHTML += `<article class="tech-card app-card rounded-2xl overflow-hidden group cursor-pointer" onclick="window.open('${news.link}', '_blank')">
                    <div class="h-48 overflow-hidden border-b border-custom relative">
                        ${news.img ? `<img src="${news.img}" class="w-full h-full object-cover">` : `<div class="w-full h-full placeholder-bg flex items-center justify-center">[ NO PHOTO ]</div>`}
                    </div>
                    <div class="p-6"><h3 class="font-bold">${news.title}</h3></div>
                </article>`;
            });
            currentRenderIndex += RENDER_BATCH_SIZE;
            document.getElementById('load-more-container').classList.toggle('hidden', currentRenderIndex >= filteredNewsItems.length);
        }

        function buildHeroBanner() { /* Логика баннера остается прежней */ }
        function nextHero() { /* Логика баннера остается прежней */ }
        function prevHero() { /* Логика баннера остается прежней */ }
        
        window.addEventListener('DOMContentLoaded', () => { fetchNews(); updateTexts(); });
    </script>
</body>
</html>
