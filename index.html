            --glow: rgba(65, 90, 119, 0.45);
            --btn-text: #e0e1dd;

        body.theme-light {
            --bg-color: #fffcf2;
            --card-bg: #ccc5b9;
            --card-border: #403d39;
            --accent: #eb5e28;
            --text-main: #252422;

            --glow: rgba(235, 94, 40, 0.25);

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        
        .app-navbar { background-color: var(--bg-color); border-bottom: 1px solid var(--card-border); opacity: 0.98; }

        .app-card:hover { border-color: var(--text-muted); box-shadow: 0 15px 30px -10px var(--glow); transform: translateY(-4px); }
        
        .text-accent { color: var(--text-main); font-weight: 800; text-shadow: 0 0 10px var(--glow); }
        .text-muted { color: var(--text-muted); }
        .bg-accent { background-color: var(--accent); color: var(--btn-text); }
        .border-custom { border-color: var(--card-border); }
        
        .filter-btn { border: 1px solid var(--card-border); color: var(--text-muted); padding: 6px 16px; border-radius: 99px; font-size: 14px; font-weight: 600; transition: all 0.3s; cursor: pointer; }
        .filter-btn:hover { border-color: var(--text-main); color: var(--text-main); }
        .filter-btn.active { background-color: var(--accent); border-color: var(--accent); color: var(--btn-text); }

        /* Hide native horizontal scrollbar while keeping scroll behavior for mobile chips. */
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        const dict = {

                feedTitle: 'Лента новостей',

                loading: 'Loading...',
                loadingMore: 'Loading older news...',
                readMore: 'Read',
                error: 'Loading error. Please refresh.',
                filterAll: 'All', filterToday: 'Today', filterYesterday: 'Yesterday',

        function getTopicLabel(topicKey, lang) {
            if (topicKey === 'all') return dict[lang].topicAll;
            return TOPIC_DEFINITIONS[topicKey] ? TOPIC_DEFINITIONS[topicKey][lang] : topicKey;
        }

        function renderTopicButtons() {
            const container = document.getElementById('topic-filters-container');
            container.innerHTML = '';

            TOPIC_ORDER.forEach(topicKey => {
                const btn = document.createElement('button');
                btn.className = `filter-btn filter-btn-topic ${topicKey === currentTopicFilter ? 'active' : ''}`;
                btn.innerText = getTopicLabel(topicKey, currentLang);
                btn.addEventListener('click', () => applyTopicFilter(topicKey));
                container.appendChild(btn);
            });
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle-btn');
            if (currentTheme === 'dark') {
                currentTheme = 'light';
                body.classList.add('theme-light');
                btn.innerText = '☀️';
            } else {
                currentTheme = 'dark';
                body.classList.remove('theme-light');
                btn.innerText = '🌙';
            }
        }

        function changeLanguage(lang) {
            if (currentLang === lang) return;
            currentLang = lang;
            const btnRu = document.getElementById('btn-ru');
            const btnEn = document.getElementById('btn-en');

            if(lang === 'ru') {
                btnRu.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent';
                btnEn.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent';
            } else {
                btnEn.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent';
                btnRu.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent';
            }
            updateTexts();
            fetchNews();
        }

        function updateTexts() {
            const t = dict[currentLang];
            document.getElementById('txt-feed-title').innerHTML = `<span class="w-2 h-6 bg-accent rounded-full transition-colors"></span> ${t.feedTitle}`;
            document.getElementById('txt-footer').innerText = t.footer;
            document.getElementById('txt-topic-label').innerText = t.topicLabel;
            document.getElementById('filter-all').innerText = t.filterAll;
            document.getElementById('filter-today').innerText = t.filterToday;
            document.getElementById('filter-yesterday').innerText = t.filterYesterday;
            renderTopicButtons();
            
            const loadBtn = document.getElementById('btn-load-more');
            if (loadBtn.disabled) {
                loadBtn.innerText = t.noMoreNews;
            } else {
                loadBtn.innerText = t.btnLoadMore;
            }
        }

        function handleImageError(imgElement) {
            const proxySrc = imgElement.getAttribute('data-proxy-src');
            const triedProxy = imgElement.getAttribute('data-proxy-tried') === '1';

            // Сначала пробуем прямую ссылку, при ошибке делаем одну попытку через наш прокси.
            if (!triedProxy && proxySrc) {
                imgElement.setAttribute('data-proxy-tried', '1');
                imgElement.src = proxySrc;
                return;
            }

            imgElement.style.display = 'none';
            if (imgElement.nextElementSibling) imgElement.nextElementSibling.style.display = 'flex';
        }

        function parseAndFormatDate(dateString) {
            try {
                const date = new Date(dateString || Date.now());
                if (isNaN(date.getTime())) return { label: "Только что", category: 'today', timestamp: Date.now() };

                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                const isToday = date.toDateString() === today.toDateString();
                const isYesterday = date.toDateString() === yesterday.toDateString();
                
                const locale = currentLang === 'ru' ? 'ru-RU' : 'en-US';
                const timeOpts = { hour: '2-digit', minute: '2-digit', hour12: currentLang === 'en' };
                const time = date.toLocaleTimeString(locale, timeOpts);
                
                if (isToday) return { label: `${dict[currentLang].filterToday}, ${time}`, category: 'today', timestamp: date.getTime() };
                if (isYesterday) return { label: `${dict[currentLang].filterYesterday}, ${time}`, category: 'yesterday', timestamp: date.getTime() };
                
                const dateSeparator = currentLang === 'ru' ? 'в' : 'at';
                return { label: `${date.toLocaleDateString(locale)} ${dateSeparator} ${time}`, category: 'older', timestamp: date.getTime() };
            } catch (e) {
                return { label: "Только что", category: 'today', timestamp: Date.now() };
            }
        }

        function decodeHtmlEntities(value) {
            const txt = document.createElement('textarea');
            txt.innerHTML = String(value || '');
            return txt.value;
        }

        function normalizeFeedUrl(url) {
            return decodeHtmlEntities(String(url || '').trim()).replace(/&amp;/gi, '&');
        }

        function safeAbsoluteUrl(url, fallback = '') {
            try {
                return new URL(String(url || '').trim()).href;
            } catch (e) {
                return fallback;
            }
        }

        function buildImageProxySrc(url) {
            const normalized = safeAbsoluteUrl(url, '');
            if (!normalized) return '';
            return `/api/image?url=${encodeURIComponent(normalized)}`;
        }

        function getCachedNews(lang) {
            try {
                const raw = localStorage.getItem(`${NEWS_CACHE_PREFIX}${lang}`);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || !Array.isArray(parsed.items) || typeof parsed.ts !== 'number') return null;
                if (Date.now() - parsed.ts > NEWS_CACHE_TTL_MS) return null;
                return {
                    items: parsed.items,
                    loadedSlot: Number.isFinite(parsed.loadedSlot) ? parsed.loadedSlot : 0,
                    maxSlots: Number.isFinite(parsed.maxSlots) && parsed.maxSlots > 0
                        ? parsed.maxSlots
                        : (SOURCE_SLOT_COUNT[lang] || 1),
                };
            } catch (e) {
                return null;
            }
        }

        function setCachedNews(lang, items, loadedSlot = 0, maxSlots = SOURCE_SLOT_COUNT[lang] || 1) {
            try {
                localStorage.setItem(
                    `${NEWS_CACHE_PREFIX}${lang}`,
                    JSON.stringify({ ts: Date.now(), items, loadedSlot, maxSlots })
                );
            } catch (e) {
                // Игнорируем ошибки localStorage (private mode / quota exceeded).
            }
        }

        function isTechNewsItem(item, lang) {
            const text = `${item.title || ''} ${item.desc || ''} ${(item.categories || []).join(' ')}`.toLowerCase();
            const keywords = lang === 'ru' ? TECH_KEYWORDS.ru : TECH_KEYWORDS.en;
            return keywords.some(keyword => text.includes(keyword));
        }

        function detectTopicKey(item, lang) {
            const text = `${item.title || ''} ${item.desc || ''} ${(item.categories || []).join(' ')}`.toLowerCase();

            for (const topicKey of TOPIC_ORDER) {
                if (topicKey === 'all') continue;
                const topic = TOPIC_DEFINITIONS[topicKey];
                if (!topic) continue;
                const keywords = lang === 'ru' ? topic.ruKeywords : topic.enKeywords;
                if (keywords.some(keyword => text.includes(keyword))) {
                    return topicKey;
                }
            }

            return 'apps_internet';
        }

        // Универсальный парсер на базе нативного DOMParser для безопасного и точного чтения RSS/Atom
        function parseXML(xmlStr) {
            const items = [];
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "application/xml");
            const nodes = xmlDoc.querySelectorAll("item, entry");

            for (const node of nodes) {
            if (items.length >= 60) break;

                // Заголовок
                const titleNode = node.querySelector("title");
                const title = titleNode ? titleNode.textContent.trim() : "Без названия";
                
                // Ссылка
                let link = "#";
                const linkNodes = node.querySelectorAll("link");
                for (let i = 0; i < linkNodes.length; i++) {
                    const lNode = linkNodes[i];
                    const href = lNode.getAttribute("href");
                    if (href) {
                        link = href.trim();
                        break;
                    } else if (lNode.textContent && lNode.textContent.trim().startsWith("http")) {
                        link = lNode.textContent.trim();
                        break;
                    }
                }
                
                // Валидация URL
                try {
                    link = new URL(link).href;
                } catch (e) {
                    link = "#";
                }

                // Дата
                const dateNode = node.querySelector("pubDate, published, updated");
                const pubDate = dateNode ? dateNode.textContent.trim() : "";
                
                // Картинка
                let imgUrl = "";
                const enclosureNode = node.querySelector("enclosure[url]");
                const mediaNode = node.querySelector("content[url], thumbnail[url], media\\:content[url], media\\:thumbnail[url]");
                
                if (enclosureNode) {
                    imgUrl = enclosureNode.getAttribute("url");
                } else if (mediaNode) {
                    imgUrl = mediaNode.getAttribute("url");
                }

                // Фолбэк для XML namespace media:* (часто встречается в EN-лентах)
                if (!imgUrl) {
                    const mediaContentNodes = node.getElementsByTagNameNS('*', 'content');
                    for (let i = 0; i < mediaContentNodes.length; i++) {
                        const candidate = mediaContentNodes[i].getAttribute('url');
                        if (candidate) {
                            imgUrl = candidate;
                            break;
                        }
                    }
                }

                if (!imgUrl) {
                    const mediaThumbNodes = node.getElementsByTagNameNS('*', 'thumbnail');
                    for (let i = 0; i < mediaThumbNodes.length; i++) {
                        const candidate = mediaThumbNodes[i].getAttribute('url');
                        if (candidate) {
                            imgUrl = candidate;
                            break;
                        }
                    }
                }

                // Если в атрибутах нет, ищем в HTML-контенте или описании
                const descNode = node.querySelector("description, content, summary");
                let rawDesc = descNode ? descNode.textContent : "";

                // Fallback: content:encoded (присутствует в RSS 2.0 лентах, даёт полный текст)
                if (!rawDesc.trim()) {
                    const encodedNode = node.getElementsByTagNameNS('*', 'encoded')[0];
                    if (encodedNode) rawDesc = encodedNode.textContent || "";
                }

                const categories = [];
                const categoryNodes = node.querySelectorAll("category");
                categoryNodes.forEach(cat => {
                    const term = cat.getAttribute('term');
                    const text = cat.textContent;
                    if (term && term.trim()) categories.push(term.trim());
                    if (text && text.trim()) categories.push(text.trim());
                });
                
                if (!imgUrl && rawDesc) {
                    const imgMatch = rawDesc.match(/<img[^>]+src=["']([^"']+)["']/i);
                    if (imgMatch) imgUrl = imgMatch[1];
                }

                imgUrl = normalizeFeedUrl(imgUrl);

                const tmp = document.createElement("div");
                tmp.innerHTML = rawDesc;
                let cleanDesc = (tmp.textContent || tmp.innerText || "").replace(/\s+/g, ' ').trim();

                // Если description был только из картинки или пустой — берём первые слова из content:encoded
                if (!cleanDesc && !rawDesc.trim()) {
                    const encodedNode = node.getElementsByTagNameNS('*', 'encoded')[0];
                    if (encodedNode) {
                        const encTmp = document.createElement("div");
                        encTmp.innerHTML = encodedNode.textContent || "";
                        cleanDesc = (encTmp.textContent || encTmp.innerText || "").replace(/\s+/g, ' ').trim();
                    }
                }

                items.push({
                    title: title,
                    link: link,
                    desc: cleanDesc.length > 110 ? cleanDesc.substring(0, 110).trim() + '...' : cleanDesc,
                    img: safeAbsoluteUrl(imgUrl, ''),
                    categories: categories,
                    pubDate: pubDate
                });
            }

            return items;
        }

        function getFilteredItemsByType(filterType) {
            const byTime = filterType === 'all' ? [...allNewsItems] : allNewsItems.filter(item => item.category === filterType);
            if (currentTopicFilter === 'all') return byTime;
            return byTime.filter(item => item.topic === currentTopicFilter);
        }

        function hasEnoughPerTopic(items, minPerTopic = 10) {
            const counts = {};
            TOPIC_ORDER.forEach(topic => {
                if (topic !== 'all') counts[topic] = 0;
            });

            items.forEach(item => {
                if (item.topic && Object.prototype.hasOwnProperty.call(counts, item.topic)) {
                    counts[item.topic] += 1;
                }
            });

            return Object.values(counts).every(count => count >= minPerTopic);
        }

        function getCurrentFilterType() {
            if (document.getElementById('filter-today').classList.contains('active')) return 'today';
            if (document.getElementById('filter-yesterday').classList.contains('active')) return 'yesterday';
            return 'all';
        }

        function mergeNewsItems(existingItems, incomingItems) {
            const byLink = new Map();
            existingItems.forEach(item => {
                if (item.link) byLink.set(item.link, item);
            });
            incomingItems.forEach(item => {
                if (item.link && !byLink.has(item.link)) {
                    byLink.set(item.link, item);
                }
            });
            return Array.from(byLink.values()).sort((a, b) => b.timestamp - a.timestamp);
        }

        function setLoadMoreLoadingState(isLoading) {
            const loadBtn = document.getElementById('btn-load-more');
            if (isLoading) {
                loadBtn.disabled = true;
                loadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                loadBtn.innerText = dict[currentLang].loadingMore;
            } else {
                loadBtn.disabled = false;
                loadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                loadBtn.innerText = dict[currentLang].btnLoadMore;
            }
        }

        async function fetchFeedSlot(requestLang, slot, signal) {
            const res = await fetch(`/api/news?lang=${requestLang}&slot=${slot}`, { signal });
            const xmlText = await res.text();
            if (xmlText.includes('<error>')) throw new Error("Ошибка бэкенда");

            const hasMore = res.headers.get('X-Feed-Has-More') === '1';
            const slotCountHeader = Number.parseInt(res.headers.get('X-Feed-Slot-Count') || '0', 10);
            const slotCount = Number.isFinite(slotCountHeader) && slotCountHeader > 0 ? slotCountHeader : 1;
            const rawItems = parseXML(xmlText).filter(item => isTechNewsItem(item, requestLang));
            let normalizedItems = rawItems.map(item => {
                const dateInfo = parseAndFormatDate(item.pubDate);
                return {
                    ...item,
                    dateLabel: dateInfo.label,
                    category: dateInfo.category,
                    topic: detectTopicKey(item, requestLang),
                    timestamp: dateInfo.timestamp
                };
            });

            // Для EN оставляем карточки только с реальными изображениями,
            // чтобы не было "часть с фото, часть без".
            if (requestLang === 'en') {
                normalizedItems = normalizedItems.filter(item => !!item.img);
            }

            return { items: normalizedItems, hasMore, slotCount };
        }

        async function ensureTopicPrefill(requestLang, signal) {
            if (isWarmingTopics || !hasMoreSourceSlots) return;
            isWarmingTopics = true;

            try {
                // Собираем список оставшихся слотов и загружаем их ПАРАЛЛЕЛЬНО.
                const slotsToFetch = [];
                for (let s = currentSourceSlot + 1; s < maxSourceSlots; s++) {
                    slotsToFetch.push(s);
                }
                if (slotsToFetch.length === 0) return;

                const results = await Promise.all(
                    slotsToFetch.map(s => fetchFeedSlot(requestLang, s, signal).catch(() => null))
                );

                let lastLoadedSlot = currentSourceSlot;
                let lastHasMore = false;

                results.forEach((result, idx) => {
                    if (!result) return;
                    const s = slotsToFetch[idx];
                    allNewsItems = mergeNewsItems(allNewsItems, result.items);
                    lastLoadedSlot = s;
                    lastHasMore = result.hasMore;
                });

                currentSourceSlot = lastLoadedSlot;
                hasMoreSourceSlots = lastHasMore;

                allNewsItems.sort((a, b) => b.timestamp - a.timestamp);
                setCachedNews(requestLang, allNewsItems, currentSourceSlot, maxSourceSlots);
                filteredNewsItems = getFilteredItemsByType(currentFilterType);
            } catch (e) {
                if (e.name !== 'AbortError') {
                    console.warn('Topic prefill skipped:', e);
                }
            } finally {
                isWarmingTopics = false;
            }
        }

        async function fetchNews(lang = currentLang, options = {}) {
            const preserveFilters = !!options.preserveFilters;
            const requestLang = lang === 'en' ? 'en' : 'ru';
            const requestToken = ++activeFetchToken;
            currentSourceSlot = 0;
            hasMoreSourceSlots = true;
            maxSourceSlots = SOURCE_SLOT_COUNT[requestLang] || 1;
            isLoadingOlder = false;
            if (!preserveFilters) {
                currentFilterType = 'all';
                currentTopicFilter = 'all';
            }

            if (activeFetchController) {
                activeFetchController.abort();
            }
            activeFetchController = new AbortController();

            document.getElementById('loader-list').classList.remove('hidden');
            document.getElementById('loader-list').innerText = dict[requestLang].loading;
            document.getElementById('news-grid').innerHTML = '';
            document.getElementById('load-more-container').classList.add('hidden');
            allNewsItems = [];

            const cachedPayload = getCachedNews(requestLang);
            if (cachedPayload && cachedPayload.items.length > 0) {
                if (requestToken !== activeFetchToken || requestLang !== currentLang) return;

                maxSourceSlots = cachedPayload.maxSlots;
                currentSourceSlot = Math.min(cachedPayload.loadedSlot, Math.max(0, maxSourceSlots - 1));
                hasMoreSourceSlots = currentSourceSlot < maxSourceSlots - 1;

                allNewsItems = [...cachedPayload.items].sort((a, b) => b.timestamp - a.timestamp);
                applyFilter('all');
            }

            try {
                const { items, hasMore, slotCount } = await fetchFeedSlot(requestLang, 0, activeFetchController.signal);

                if (requestToken !== activeFetchToken || requestLang !== currentLang) return;

                currentSourceSlot = 0;
                hasMoreSourceSlots = hasMore;
                maxSourceSlots = slotCount;

                if (allNewsItems.length > 0) {
                    allNewsItems = mergeNewsItems(items, allNewsItems);
                } else {
                    allNewsItems = items;
                }

                if (allNewsItems.length === 0) throw new Error("Лента пуста");

                allNewsItems.sort((a, b) => b.timestamp - a.timestamp);
                setCachedNews(requestLang, allNewsItems, currentSourceSlot, maxSourceSlots);
                applyFilter('all');

                // Предзагрузка тем идёт в фоне — не блокирует отображение первых карточек.
                ensureTopicPrefill(requestLang, activeFetchController.signal);

            } catch (error) {
                if (error.name === 'AbortError') return;
                console.error("Критическая ошибка:", error);
                document.getElementById('loader-list').classList.remove('hidden');
                document.getElementById('loader-list').innerText = dict[requestLang].error;
            }
        }

        async function loadOlderNews() {
            if (isLoadingOlder || !hasMoreSourceSlots) return;
            isLoadingOlder = true;
            setLoadMoreLoadingState(true);

            try {
                const requestLang = currentLang;
                const previousRenderedCount = currentRenderIndex;
                let appendedAny = false;

                // Пытаемся пройти через проблемный слот и взять первый валидный следующий.
                while (!appendedAny && currentSourceSlot + 1 < maxSourceSlots) {
                    const nextSlot = currentSourceSlot + 1;
                    const { items, hasMore } = await fetchFeedSlot(requestLang, nextSlot);

                    currentSourceSlot = nextSlot;
                    hasMoreSourceSlots = hasMore;

                    const oldestLoadedTs = allNewsItems.length > 0
                        ? Math.min(...allNewsItems.map(item => item.timestamp || 0))
                        : Number.MAX_SAFE_INTEGER;
                    const olderItems = items.filter(item => (item.timestamp || 0) <= oldestLoadedTs);

                    const beforeCount = allNewsItems.length;
                    allNewsItems = mergeNewsItems(allNewsItems, olderItems);
                    appendedAny = allNewsItems.length > beforeCount;

                    if (!hasMoreSourceSlots) break;
                }

                setCachedNews(requestLang, allNewsItems, currentSourceSlot, maxSourceSlots);

                filteredNewsItems = getFilteredItemsByType(currentFilterType);

                if (filteredNewsItems.length > previousRenderedCount) {
                    renderNextBatch();
                }
            } catch (error) {
                console.error("Ошибка догрузки:", error);
            } finally {
                isLoadingOlder = false;
                if (hasMoreSourceSlots) {
                    setLoadMoreLoadingState(false);
                }
            }
        }

        function applyTopicFilter(topicKey) {
            currentTopicFilter = topicKey;
            document.querySelectorAll('.filter-btn-topic').forEach(btn => btn.classList.remove('active'));

            const topicButtons = document.querySelectorAll('.filter-btn-topic');
            const selectedIndex = TOPIC_ORDER.indexOf(topicKey);
            if (selectedIndex >= 0 && topicButtons[selectedIndex]) {
                topicButtons[selectedIndex].classList.add('active');
            }

            filteredNewsItems = getFilteredItemsByType(currentFilterType);
            document.getElementById('loader-list').classList.add('hidden');
            document.getElementById('news-grid').innerHTML = '';
            currentRenderIndex = 0;

            if (filteredNewsItems.length === 0) {
                document.getElementById('loader-list').classList.remove('hidden');
                document.getElementById('loader-list').innerText = dict[currentLang].empty;
                document.getElementById('load-more-container').classList.add('hidden');
                return;
            }

            renderNextBatch();
        }

        function applyFilter(filterType) {
            if (allNewsItems.length === 0) return; 
            currentFilterType = filterType;
            document.querySelectorAll('.filter-btn-time').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${filterType}`).classList.add('active');

            filteredNewsItems = getFilteredItemsByType(filterType);

            document.getElementById('loader-list').classList.add('hidden');
            document.getElementById('news-grid').innerHTML = '';
            currentRenderIndex = 0;

            if (filteredNewsItems.length === 0) {
                document.getElementById('loader-list').classList.remove('hidden');
                document.getElementById('loader-list').innerText = dict[currentLang].empty;
                document.getElementById('load-more-container').classList.add('hidden');
                return;
            }
            
            document.getElementById('btn-load-more').innerText = dict[currentLang].btnLoadMore;
            document.getElementById('btn-load-more').disabled = false;
            document.getElementById('btn-load-more').classList.remove('opacity-50', 'cursor-not-allowed');
            
            renderNextBatch();
        }

        function escapeHTML(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function renderNextBatch() {
            if (currentRenderIndex >= filteredNewsItems.length) {
                if (hasMoreSourceSlots) {
                    loadOlderNews();
                }
                return;
            }

            const grid = document.getElementById('news-grid');
            const batch = filteredNewsItems.slice(currentRenderIndex, currentRenderIndex + RENDER_BATCH_SIZE);
            
            batch.forEach((news, i) => {
                const safeTitle = escapeHTML(news.title);
                const safeDesc = escapeHTML(news.desc);
                const safeDateLabel = escapeHTML(news.dateLabel);
                const safeLink = safeAbsoluteUrl(news.link, '#');
                const directImg = safeAbsoluteUrl(news.img, '');
                const proxyImg = buildImageProxySrc(news.img);
                const safeImg = escapeHTML(directImg);
                const safeProxyImg = escapeHTML(proxyImg);

                const imgBlock = safeImg 
                    ? `<img src="${safeImg}" data-proxy-src="${safeProxyImg}" data-proxy-tried="0" onerror="handleImageError(this)" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                       <div class="absolute inset-0 placeholder-bg items-center justify-center text-xs font-bold text-[var(--text-main)] code-font uppercase" style="display:none;">[ NO PHOTO ]</div>`
                    : `<div class="absolute inset-0 placeholder-bg flex items-center justify-center text-xs font-bold text-[var(--text-main)] code-font uppercase">[ NO PHOTO ]</div>`;

                const cardHtml = `
                    <article class="tech-card app-card rounded-2xl overflow-hidden group" style="animation-delay: ${(i % RENDER_BATCH_SIZE) * 50}ms">
                        <a href="${safeLink}" target="_blank" rel="noopener noreferrer" class="flex flex-col h-full cursor-pointer outline-none block">
                            <div class="h-48 overflow-hidden border-b border-custom relative">
                                ${imgBlock}
                                <div class="absolute top-3 left-3 bg-[#0a1128]/90 backdrop-blur-md border border-custom px-2.5 py-1 rounded-md text-[10px] font-bold code-font text-[var(--text-main)] shadow-lg">
                                    ${safeDateLabel}
                                </div>
                            </div>
                            <div class="p-6 space-y-3 flex-grow">
                                <h3 class="text-base font-bold leading-snug group-hover:text-[var(--text-muted)] transition-colors">${safeTitle}</h3>
                                <p class="text-sm text-muted leading-relaxed">${safeDesc}</p>
                            </div>
                            <div class="p-6 pt-0 flex items-center justify-between text-xs border-t border-custom/30 mt-4 pt-4">
                                <span class="text-muted code-font">REALLY? NEWS</span>
                                <span class="text-[var(--text-main)] font-bold flex items-center gap-1 bg-accent/20 px-3 py-1.5 rounded-lg group-hover:bg-accent group-hover:text-[var(--btn-text)] transition-colors">${dict[currentLang].readMore} →</span>
                            </div>
                        </a>
                    </article>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });

            currentRenderIndex += RENDER_BATCH_SIZE;
            
            const loadContainer = document.getElementById('load-more-container');
            const loadBtn = document.getElementById('btn-load-more');
            
            if (currentRenderIndex >= filteredNewsItems.length) {
                loadContainer.classList.remove('hidden');
                if (hasMoreSourceSlots) {
                    loadBtn.innerText = dict[currentLang].btnLoadMore;
                    loadBtn.disabled = false;
                    loadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                } else {
                    loadBtn.innerText = dict[currentLang].noMoreNews;
                    loadBtn.disabled = true;
                    loadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            } else {
                loadContainer.classList.remove('hidden');
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            updateTexts();
            fetchNews(currentLang);

            // Периодический авто-рефреш, чтобы лента не "застывала" надолго.
            setInterval(() => {
                if (!isLoadingOlder) {
                    fetchNews(currentLang, { preserveFilters: true });
                }
            }, 3 * 60 * 1000);
        });
    </script>
</body>
