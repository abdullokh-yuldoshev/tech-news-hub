<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALLY? | Живая Лента Технологий</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a1128;
            --card-bg: #001f54;
            --card-border: #034078;
            --accent: #034078;
            --text-main: #dce1de;
            --text-muted: rgba(220, 225, 222, 0.65); 
            --glow: rgba(3, 64, 120, 0.4);
            --btn-text: #dce1de;
        }

        body.theme-light {
            --bg-color: #1f2421;
            --card-bg: rgba(33, 104, 105, 0.2);
            --card-border: #216869;
            --accent: #49a078;
            --text-main: #dce1de;
            --text-muted: #9cc5a1;
            --glow: rgba(73, 160, 120, 0.4);
            --btn-text: #1f2421;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        
        .app-navbar { background-color: var(--bg-color); border-bottom: 1px solid var(--card-border); opacity: 0.98; }
        .app-card { background-color: var(--card-bg); border: 1px solid var(--card-border); transition: all 0.3s ease; }
        .app-card:hover { border-color: var(--text-muted); box-shadow: 0 15px 30px -10px var(--glow); transform: translateY(-4px); }
        
        .text-accent { color: var(--text-main); font-weight: 800; text-shadow: 0 0 10px var(--glow); }
        .text-muted { color: var(--text-muted); }
        .bg-accent { background-color: var(--accent); color: var(--btn-text); }
        .border-custom { border-color: var(--card-border); }
        
        .filter-btn { border: 1px solid var(--card-border); color: var(--text-muted); padding: 8px 18px; border-radius: 99px; font-size: 14px; font-weight: 600; transition: all 0.3s; cursor: pointer; white-space: nowrap; }
        .filter-btn:hover { border-color: var(--text-main); color: var(--text-main); }
        .filter-btn.active { background-color: var(--accent); border-color: var(--accent); color: var(--btn-text); }

        .placeholder-bg { background: linear-gradient(to bottom right, var(--bg-color), var(--card-border)); }
        
        /* Анимации для ленты и баннера */
        .tech-card { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        
        .hero-slide { transition: opacity 0.8s ease-in-out; }
        .hero-slide.active { opacity: 1; z-index: 10; pointer-events: auto; }
        .hero-slide.inactive { opacity: 0; z-index: 0; pointer-events: none; }
        
        .dot { transition: all 0.3s ease; }
        .dot.active { background-color: var(--text-main); width: 24px; }
    </style>
</head>
<body class="min-h-screen"> 

    <header class="sticky top-0 z-50 backdrop-blur-md app-navbar">
        <div class="max-w-7xl px-4 sm:px-6 lg:px-8 mx-auto h-20 flex items-center justify-between">
            <a href="#" class="flex items-center space-x-2 group" onclick="location.reload()">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                    <span class="code-font font-bold text-xl text-[var(--btn-text)]">?</span>
                </div>
                <span class="text-2xl font-extrabold tracking-tight">REALLY<span class="text-accent">?</span></span>
            </a>
            
            <div class="flex items-center space-x-3">
                <button onclick="toggleTheme()" class="app-card rounded-xl p-2 text-sm hover:opacity-80 transition-all" id="theme-toggle-btn">🌙</button>
                <div class="app-card rounded-xl p-1 flex">
                    <button id="btn-ru" onclick="changeLanguage('ru')" class="px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent">RU</button>
                    <button id="btn-en" onclick="changeLanguage('en')" class="px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl px-4 sm:px-6 lg:px-8 mx-auto py-8">
        
        <div id="loader-list" class="text-center py-20 text-muted code-font text-lg">Загрузка...</div>

        <!-- HERO БАННЕР (КАРУСЕЛЬ) -->
        <section id="hero-section" class="mb-12 relative w-full h-[400px] md:h-[500px] rounded-3xl overflow-hidden hidden shadow-2xl border border-custom group">
            <div id="hero-slides-container" class="w-full h-full relative"></div>
            
            <!-- Индикаторы (точки) -->
            <div id="hero-dots" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex space-x-2 z-20"></div>
            
            <!-- Кнопки управления -->
            <button onclick="prevHero()" class="absolute left-4 top-1/2 transform -translate-y-1/2 z-20 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-[var(--accent)] backdrop-blur-md">←</button>
            <button onclick="nextHero()" class="absolute right-4 top-1/2 transform -translate-y-1/2 z-20 bg-black/50 text-white w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-[var(--accent)] backdrop-blur-md">→</button>
        </section>

        <!-- НАВИГАЦИЯ КАТЕГОРИЙ -->
        <div id="content-section" class="hidden">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <h2 id="txt-feed-title" class="text-2xl font-extrabold tracking-tight flex items-center gap-2 shrink-0">
                    <span class="w-2 h-6 bg-accent rounded-full transition-colors"></span> Лента новостей
                </h2>
                
                <div class="flex space-x-2 overflow-x-auto pb-2 md:pb-0 scrollbar-hide w-full md:justify-end" id="filters-container">
                    <button onclick="applyCategoryFilter('all')" id="filter-all" class="filter-btn active">Все</button>
                    <button onclick="applyCategoryFilter('ai')" id="filter-ai" class="filter-btn">ИИ и Нейросети</button>
                    <button onclick="applyCategoryFilter('gadgets')" id="filter-gadgets" class="filter-btn">Гаджеты</button>
                    <button onclick="applyCategoryFilter('games')" id="filter-games" class="filter-btn">Игры</button>
                </div>
            </div>
            
            <!-- СЕТКА НОВОСТЕЙ -->
            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

            <div id="load-more-container" class="flex justify-center mt-12 mb-8 hidden">
                <button onclick="renderNextBatch()" id="btn-load-more" class="app-card text-[var(--text-main)] font-bold px-8 py-3 rounded-xl hover:bg-[var(--accent)] hover:text-[var(--btn-text)] transition-all outline-none cursor-pointer border border-custom shadow-lg">
                    Показать еще ↓
                </button>
            </div>
        </div>
    </main>

    <footer class="border-t border-custom mt-12 text-muted text-sm py-8 text-center">
        <p id="txt-footer"></p>
    </footer>

    <script>
        let currentLang = 'ru';
        let currentTheme = 'dark';
        
        let allNewsItems = []; 
        let filteredNewsItems = [];
        let heroItems = [];
        let currentRenderIndex = 0;
        const RENDER_BATCH_SIZE = 9;

        // Переменные для карусели
        let currentHeroIndex = 0;
        let heroInterval;

        const dict = {
            ru: {
                feedTitle: 'Лента новостей',
                footer: `© ${new Date().getFullYear()} REALLY?. Собственный сервер API.`,
                loading: 'Загрузка...',
                readMore: 'Читать',
                error: 'Ошибка загрузки. Обновите страницу.',
                filterAll: 'Все', filterAI: 'ИИ и Нейросети', filterGadgets: 'Гаджеты', filterGames: 'Игры',
                empty: 'В этой категории пока нет новостей.',
                btnLoadMore: 'Показать еще ↓',
                noMoreNews: 'Больше новостей нет',
                topBadge: 'ГЛАВНОЕ'
            },
            en: {
                feedTitle: 'News Feed',
                footer: `© ${new Date().getFullYear()} REALLY?. Custom API Server.`,
                loading: 'Loading...',
                readMore: 'Read',
                error: 'Loading error. Please refresh.',
                filterAll: 'All', filterAI: 'AI & Neural Nets', filterGadgets: 'Gadgets', filterGames: 'Gaming',
                empty: 'No news found in this category.',
                btnLoadMore: 'Load more ↓',
                noMoreNews: 'No more news',
                topBadge: 'TOP STORY'
            }
        };

        // Ключевые слова для умной фильтрации категорий
        const categoryKeywords = {
            ai: ['ai', 'ии', 'нейросеть', 'нейросети', 'gpt', 'llm', 'gemini', 'openai', 'artificial intelligence', 'apple intelligence', 'chatgpt', 'copilot', 'algorithm'],
            gadgets: ['смартфон', 'phone', 'iphone', 'samsung', 'ноутбук', 'laptop', 'macbook', 'apple watch', 'gadget', 'гаджет', 'tablet', 'планшет', 'device', 'устройство', 'pixel'],
            games: ['game', 'игра', 'игры', 'playstation', 'xbox', 'nintendo', 'steam', 'gta', 'rpg', 'shooter', 'console', 'консоль']
        };

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle-btn');
            if (currentTheme === 'dark') {
                currentTheme = 'light';
                body.classList.add('theme-light');
                btn.innerText = '☀️';
            } else {
                currentTheme = 'dark';
                body.classList.remove('theme-light');
                btn.innerText = '🌙';
            }
        }

        function changeLanguage(lang) {
            if (currentLang === lang) return;
            currentLang = lang;
            const btnRu = document.getElementById('btn-ru');
            const btnEn = document.getElementById('btn-en');

            if(lang === 'ru') {
                btnRu.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent';
                btnEn.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent';
            } else {
                btnEn.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent';
                btnRu.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent';
            }
            updateTexts();
            fetchNews();
        }

        function updateTexts() {
            const t = dict[currentLang];
            document.getElementById('txt-feed-title').innerHTML = `<span class="w-2 h-6 bg-accent rounded-full transition-colors"></span> ${t.feedTitle}`;
            document.getElementById('txt-footer').innerText = t.footer;
            
            document.getElementById('filter-all').innerText = t.filterAll;
            document.getElementById('filter-ai').innerText = t.filterAI;
            document.getElementById('filter-gadgets').innerText = t.filterGadgets;
            document.getElementById('filter-games').innerText = t.filterGames;
            
            const loadBtn = document.getElementById('btn-load-more');
            if(loadBtn && loadBtn.innerText !== dict['ru'].noMoreNews && loadBtn.innerText !== dict['en'].noMoreNews) {
                loadBtn.innerText = t.btnLoadMore;
            }
        }

        function handleImageError(imgElement) {
            imgElement.style.display = 'none';
            if(imgElement.nextElementSibling) imgElement.nextElementSibling.style.display = 'flex';
        }

        function parseAndFormatDate(dateString) {
            try {
                const date = new Date(dateString || Date.now());
                if (isNaN(date.getTime())) return { label: "Только что", timestamp: Date.now() };

                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                const isToday = date.toDateString() === today.toDateString();
                const isYesterday = date.toDateString() === yesterday.toDateString();
                
                const locale = currentLang === 'ru' ? 'ru-RU' : 'en-US';
                const timeOpts = { hour: '2-digit', minute: '2-digit', hour12: currentLang === 'en' };
                const time = date.toLocaleTimeString(locale, timeOpts);
                
                if (isToday) return { label: `${currentLang === 'ru' ? 'Сегодня' : 'Today'}, ${time}`, timestamp: date.getTime() };
                if (isYesterday) return { label: `${currentLang === 'ru' ? 'Вчера' : 'Yesterday'}, ${time}`, timestamp: date.getTime() };
                
                const dateSeparator = currentLang === 'ru' ? 'в' : 'at';
                return { label: `${date.toLocaleDateString(locale)} ${dateSeparator} ${time}`, timestamp: date.getTime() };
            } catch (e) {
                return { label: "Только что", timestamp: Date.now() };
            }
        }

        function parseXML(xmlStr) {
            const items = [];
            const itemRegex = /<(?:item|entry)>([\s\S]*?)<\/(?:item|entry)>/gi;
            let match;
            
            while ((match = itemRegex.exec(xmlStr)) !== null) {
                const itemStr = match[1];
                
                const titleMatch = itemStr.match(/<title[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/title>/i);
                const title = titleMatch ? titleMatch[1].replace(/<[^>]+>/g, '').trim() : "Без названия";
                
                let link = "#";
                const linkMatchAtom = itemStr.match(/<link[^>]*href=["']([^"']+)["']/i);
                const linkMatchRSS = itemStr.match(/<link>(.*?)<\/link>/i);
                if (linkMatchRSS && !linkMatchRSS[1].includes("href=")) {
                    link = linkMatchRSS[1].trim();
                } else if (linkMatchAtom) {
                    link = linkMatchAtom[1].trim();
                }
                
                const dateMatch = itemStr.match(/<(?:pubDate|published|updated)>(.*?)<\/(?:pubDate|published|updated)>/i);
                const pubDate = dateMatch ? dateMatch[1].trim() : "";
                
                let imgUrl = "";
                const imgMatch = itemStr.match(/<img[^>]*\bsrc=["']([^"']+)["']/i);
                const mediaMatch = itemStr.match(/<media:(?:content|thumbnail)[^>]*\burl=["']([^"']+)["']/i);
                const encMatch = itemStr.match(/<enclosure[^>]*\burl=["']([^"']+)["']/i);
                
                if (imgMatch) imgUrl = imgMatch[1];
                else if (mediaMatch) imgUrl = mediaMatch[1];
                else if (encMatch) imgUrl = encMatch[1];

                const descMatch = itemStr.match(/<(?:description|content|summary)[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/(?:description|content|summary)>/i);
                let rawDesc = descMatch ? descMatch[1] : "";
                
                const tmp = document.createElement("div");
                tmp.innerHTML = rawDesc;
                let cleanDesc = (tmp.textContent || tmp.innerText || "").replace(/\s+/g, ' ').trim();

                items.push({
                    title: title,
                    link: link,
                    desc: cleanDesc.length > 150 ? cleanDesc.substring(0, 150).trim() + '...' : (cleanDesc || 'Подробности читайте на первоисточнике.'),
                    img: imgUrl ? imgUrl.replace(/&amp;/g, '&') : "",
                    pubDate: pubDate,
                    searchString: (title + " " + cleanDesc).toLowerCase() // Для фильтра
                });
                
                if (items.length >= 50) break; // Загружаем 50 для лучшей фильтрации
            }
            return items;
        }

        async function fetchNews() {
            document.getElementById('loader-list').classList.remove('hidden');
            document.getElementById('hero-section').classList.add('hidden');
            document.getElementById('content-section').classList.add('hidden');
            allNewsItems = [];
            heroItems = [];

            try {
                const res = await fetch(`/api/news?lang=${currentLang}&t=${Date.now()}`);
                const xmlText = await res.text();
                
                if (xmlText.includes('<error>')) throw new Error("Ошибка бэкенда");

                const rawItems = parseXML(xmlText);

                rawItems.forEach(item => {
                    const dateInfo = parseAndFormatDate(item.pubDate);
                    allNewsItems.push({ ...item, dateLabel: dateInfo.label, timestamp: dateInfo.timestamp });
                });

                if (allNewsItems.length === 0) throw new Error("Лента пуста");

                // Сортировка от свежих к старым
                allNewsItems.sort((a, b) => b.timestamp - a.timestamp);
                
                // Первые 5 новостей забираем в баннер
                heroItems = allNewsItems.slice(0, 5);
                // Остальные идут в общую ленту
                allNewsItems = allNewsItems.slice(5);

                buildHeroBanner();
                applyCategoryFilter('all');

                document.getElementById('loader-list').classList.add('hidden');
                document.getElementById('hero-section').classList.remove('hidden');
                document.getElementById('content-section').classList.remove('hidden');

            } catch (error) {
                console.error("Ошибка:", error);
                document.getElementById('loader-list').classList.remove('hidden');
                document.getElementById('loader-list').innerText = dict[currentLang].error;
            }
        }

        // --- ЛОГИКА HERO БАННЕРА ---
        function buildHeroBanner() {
            const container = document.getElementById('hero-slides-container');
            const dotsContainer = document.getElementById('hero-dots');
            container.innerHTML = '';
            dotsContainer.innerHTML = '';

            heroItems.forEach((news, index) => {
                // Создаем слайд
                const isActive = index === 0 ? 'active' : 'inactive';
                const bgImage = news.img ? `url('${news.img}')` : 'var(--bg-color)';
                
                container.innerHTML += `
                    <div class="hero-slide ${isActive} absolute top-0 left-0 w-full h-full bg-cover bg-center" style="background-image: ${bgImage};" id="slide-${index}">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#0a1128] via-[#0a1128]/80 to-transparent"></div>
                        <div class="absolute bottom-0 left-0 w-full p-6 md:p-12 pb-16">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 mb-4 rounded-full text-[10px] md:text-xs font-bold border border-accent text-accent bg-[#0a1128]/50 backdrop-blur-md code-font tracking-widest uppercase">
                                🔥 ${dict[currentLang].topBadge} • ${news.dateLabel}
                            </span>
                            <h1 class="text-2xl md:text-4xl lg:text-5xl font-black text-white mb-4 leading-tight tracking-tight max-w-4xl cursor-pointer hover:text-blue-300 transition-colors" onclick="window.open('${news.link}', '_blank')">
                                ${news.title}
                            </h1>
                            <p class="text-gray-300 text-sm md:text-lg max-w-3xl hidden md:block mb-6 line-clamp-2">${news.desc}</p>
                            <a href="${news.link}" target="_blank" class="inline-flex items-center justify-center px-6 py-2.5 bg-accent text-white font-bold rounded-lg hover:opacity-90 transition-opacity">
                                ${dict[currentLang].readMore} →
                            </a>
                        </div>
                    </div>
                `;

                // Создаем точку
                const dotActive = index === 0 ? 'active' : '';
                dotsContainer.innerHTML += `
                    <button onclick="goToHero(${index})" class="dot ${dotActive} w-2 h-2 rounded-full bg-gray-500 hover:bg-white focus:outline-none" id="dot-${index}"></button>
                `;
            });

            currentHeroIndex = 0;
            startHeroCarousel();
        }

        function updateHeroUI() {
            heroItems.forEach((_, index) => {
                const slide = document.getElementById(`slide-${index}`);
                const dot = document.getElementById(`dot-${index}`);
                if (index === currentHeroIndex) {
                    slide.classList.replace('inactive', 'active');
                    dot.classList.add('active');
                    dot.classList.replace('bg-gray-500', 'bg-white');
                } else {
                    slide.classList.replace('active', 'inactive');
                    dot.classList.remove('active');
                    dot.classList.replace('bg-white', 'bg-gray-500');
                }
            });
        }

        function nextHero() {
            currentHeroIndex = (currentHeroIndex + 1) % heroItems.length;
            updateHeroUI();
            startHeroCarousel(); // Сброс таймера при ручном клике
        }

        function prevHero() {
            currentHeroIndex = (currentHeroIndex - 1 + heroItems.length) % heroItems.length;
            updateHeroUI();
            startHeroCarousel();
        }

        function goToHero(index) {
            currentHeroIndex = index;
            updateHeroUI();
            startHeroCarousel();
        }

        function startHeroCarousel() {
            clearInterval(heroInterval);
            heroInterval = setInterval(nextHero, 5000); // Смена каждые 5 сек
        }

        // --- ЛОГИКА КАТЕГОРИЙ ---
        function applyCategoryFilter(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${category}`).classList.add('active');

            if (category === 'all') {
                filteredNewsItems = [...allNewsItems];
            } else {
                const keywords = categoryKeywords[category];
                filteredNewsItems = allNewsItems.filter(item => {
                    // Ищем совпадение хотя бы одного ключевого слова
                    return keywords.some(kw => item.searchString.includes(kw));
                });
            }

            document.getElementById('news-grid').innerHTML = '';
            currentRenderIndex = 0;

            const grid = document.getElementById('news-grid');
            
            if (filteredNewsItems.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-muted code-font">${dict[currentLang].empty}</div>`;
                document.getElementById('load-more-container').classList.add('hidden');
                return;
            }
            
            document.getElementById('btn-load-more').innerText = dict[currentLang].btnLoadMore;
            document.getElementById('btn-load-more').disabled = false;
            document.getElementById('btn-load-more').classList.remove('opacity-50', 'cursor-not-allowed');
            
            renderNextBatch();
        }

        function renderNextBatch() {
            if (currentRenderIndex >= filteredNewsItems.length) return;

            const grid = document.getElementById('news-grid');
            const batch = filteredNewsItems.slice(currentRenderIndex, currentRenderIndex + RENDER_BATCH_SIZE);
            
            batch.forEach((news, i) => {
                const imgBlock = news.img 
                    ? `<img src="${news.img}" onerror="handleImageError(this)" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                       <div class="w-full h-full placeholder-bg items-center justify-center text-xs font-bold text-[var(--text-main)] code-font uppercase" style="display:none;">[ NO PHOTO ]</div>`
                    : `<div class="w-full h-full placeholder-bg flex items-center justify-center text-xs font-bold text-[var(--text-main)] code-font uppercase">[ NO PHOTO ]</div>`;

                grid.innerHTML += `
                    <article class="tech-card app-card rounded-2xl overflow-hidden group" style="animation-delay: ${(i % RENDER_BATCH_SIZE) * 50}ms">
                        <a href="${news.link}" target="_blank" class="flex flex-col h-full cursor-pointer outline-none block">
                            <div class="h-48 overflow-hidden border-b border-custom relative">
                                ${imgBlock}
                                <div class="absolute top-3 left-3 bg-[#0a1128]/90 backdrop-blur-md border border-custom px-2.5 py-1 rounded-md text-[10px] font-bold code-font text-[var(--text-main)] shadow-lg">
                                    ${news.dateLabel}
                                </div>
                            </div>
                            <div class="p-6 space-y-3 flex-grow">
                                <h3 class="text-base font-bold leading-snug group-hover:text-[var(--text-muted)] transition-colors">${news.title}</h3>
                                <p class="text-sm text-muted leading-relaxed">${news.desc}</p>
                            </div>
                            <div class="p-6 pt-0 flex items-center justify-between text-xs border-t border-custom/30 mt-4 pt-4">
                                <span class="text-muted code-font">REALLY? NEWS</span>
                                <span class="text-[var(--text-main)] font-bold flex items-center gap-1 bg-accent/20 px-3 py-1.5 rounded-lg group-hover:bg-accent group-hover:text-[var(--btn-text)] transition-colors">${dict[currentLang].readMore} →</span>
                            </div>
                        </a>
                    </article>
                `;
            });

            currentRenderIndex += RENDER_BATCH_SIZE;
            
            const loadContainer = document.getElementById('load-more-container');
            const loadBtn = document.getElementById('btn-load-more');
            
            if (currentRenderIndex >= filteredNewsItems.length) {
                loadContainer.classList.remove('hidden');
                loadBtn.innerText = dict[currentLang].noMoreNews;
                loadBtn.disabled = true;
                loadBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                loadContainer.classList.remove('hidden');
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            updateTexts();
            fetchNews();
        });
    </script>
</body>
</html>
