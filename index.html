<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALLY? | Живая Лента Технологий</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b2545;
            --card-bg: #13315c;
            --card-border: #134074;
            --accent: #8da9c4;
            --text-main: #eef4ed;
            --text-muted: #8da9c4;
            --glow: #134074;
            --btn-text: #0b2545;
        }

        body.theme-light {
            --bg-color: #e0fbfc;
            --card-bg: #c2dfe3;
            --card-border: #9db4c0;
            --accent: #5c6b73;
            --text-main: #253237;
            --text-muted: #5c6b73;
            --glow: #9db4c0;
            --btn-text: #e0fbfc;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        
        .app-navbar { background-color: var(--bg-color); border-bottom: 1px solid var(--card-border); opacity: 0.98; }
        .app-card { background-color: var(--card-bg); border: 1px solid var(--card-border); transition: all 0.3s ease; }
        .app-card:hover { border-color: var(--text-muted); box-shadow: 0 15px 30px -10px var(--glow); transform: translateY(-4px); }
        
        .text-accent { color: var(--text-main); font-weight: 800; text-shadow: 0 0 10px var(--glow); }
        .text-muted { color: var(--text-muted); }
        .bg-accent { background-color: var(--accent); color: var(--btn-text); }
        .border-custom { border-color: var(--card-border); }
        
        .filter-btn { border: 1px solid var(--card-border); color: var(--text-muted); padding: 6px 16px; border-radius: 99px; font-size: 14px; font-weight: 600; transition: all 0.3s; cursor: pointer; }
        .filter-btn:hover { border-color: var(--text-main); color: var(--text-main); }
        .filter-btn.active { background-color: var(--accent); border-color: var(--accent); color: var(--btn-text); }
        .news-date-badge { background-color: var(--card-border); color: var(--text-main); border: 1px solid var(--accent); }

        .placeholder-bg { background: linear-gradient(to bottom right, var(--bg-color), var(--card-border)); }
        .tech-card { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s ease forwards; }
        .reader-panel { background-color: var(--bg-color); border: 1px solid var(--card-border); }
        .reader-content { line-height: 1.8; color: var(--text-main); }
        .reader-content p, .reader-content ul, .reader-content ol, .reader-content blockquote, .reader-content figure { margin-bottom: 0.9rem; }
        .reader-content h1, .reader-content h2, .reader-content h3, .reader-content h4 { margin: 1rem 0 0.6rem; font-weight: 800; }
        .reader-content a { color: var(--accent); text-decoration: underline; }
        .reader-content img { max-width: 100%; height: auto; border-radius: 0.75rem; }
        .reader-content blockquote { border-left: 3px solid var(--card-border); padding-left: 0.75rem; color: var(--text-muted); }
        .reader-skeleton { background: linear-gradient(90deg, var(--card-bg) 25%, var(--card-border) 50%, var(--card-bg) 75%); background-size: 200% 100%; animation: skeletonSlide 1.2s ease-in-out infinite; }
        .reader-skeleton-line { height: 0.85rem; border-radius: 999px; margin-bottom: 0.7rem; }
        .reader-skeleton-block { border-radius: 1rem; }
        @keyframes skeletonSlide { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen theme-light"> 

    <header class="sticky top-0 z-50 backdrop-blur-md app-navbar">
        <div class="max-w-7xl px-4 sm:px-6 lg:px-8 mx-auto h-20 flex items-center justify-between">
            <a href="#" class="flex items-center space-x-2 group" onclick="location.reload()">
                <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                    <span class="code-font font-bold text-xl text-[var(--btn-text)]">?</span>
                </div>
                <span class="text-2xl font-extrabold tracking-tight">REALLY<span class="text-accent">?</span></span>
            </a>
            
            <div class="flex items-center space-x-3">
                <button onclick="toggleTheme()" class="app-card rounded-xl p-2 text-sm hover:opacity-80 transition-all" id="theme-toggle-btn">🌙</button>
                <div class="app-card rounded-xl p-1 flex">
                    <button id="btn-ru" onclick="changeLanguage('ru')" class="px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent">RU</button>
                    <button id="btn-en" onclick="changeLanguage('en')" class="px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl px-4 sm:px-6 lg:px-8 mx-auto py-8">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <h2 id="txt-feed-title" class="text-2xl font-extrabold tracking-tight flex items-center gap-2">
                <span class="w-2 h-6 bg-accent rounded-full transition-colors"></span> Лента новостей
            </h2>
            
            <div class="flex space-x-2 overflow-x-auto pb-2 md:pb-0 scrollbar-hide" id="filters-container">
                <button onclick="applyFilter('all')" id="filter-all" class="filter-btn active">Все</button>
                <button onclick="applyFilter('today')" id="filter-today" class="filter-btn">Сегодня</button>
                <button onclick="applyFilter('yesterday')" id="filter-yesterday" class="filter-btn">Вчера</button>
            </div>
        </div>

        <div id="loader-list" class="text-center py-20 text-muted code-font text-lg">Загрузка...</div>
        
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        <div id="load-more-container" class="flex justify-center mt-12 mb-8 hidden">
            <button onclick="renderNextBatch()" id="btn-load-more" class="app-card text-[var(--text-main)] font-bold px-8 py-3 rounded-xl hover:bg-[var(--accent)] hover:text-[var(--btn-text)] transition-all outline-none cursor-pointer border border-custom shadow-lg">
                Показать еще ↓
            </button>
        </div>
    </main>

    <footer class="border-t border-custom mt-12 text-muted text-sm py-8 text-center">
        <p id="txt-footer"></p>
    </footer>

    <div id="article-reader" class="fixed inset-0 z-[90] hidden">
        <div class="absolute inset-0 bg-black/60" onclick="closeReader()"></div>
        <div class="relative z-10 h-full w-full flex items-center justify-center p-4 md:p-6">
            <div class="reader-panel w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl shadow-2xl">
                <div class="sticky top-0 z-10 p-4 flex items-center justify-between border-b border-custom" style="background-color: var(--bg-color);">
                    <button onclick="closeReader()" class="app-card px-4 py-2 rounded-xl text-sm font-bold" id="reader-btn-back">Назад</button>
                    <a id="reader-source-link" href="#" target="_blank" rel="noopener noreferrer" class="bg-accent px-4 py-2 rounded-xl text-sm font-bold" style="color: var(--btn-text);">Источник ↗</a>
                </div>
                <div class="p-4 md:p-6">
                    <p id="reader-date" class="text-xs code-font text-muted mb-2"></p>
                    <h2 id="reader-title" class="text-2xl font-extrabold leading-tight mb-4"></h2>
                    <div id="reader-image-wrap" class="rounded-2xl overflow-hidden border border-custom mb-5 hidden">
                        <img id="reader-image" src="" alt="" class="w-full h-auto max-h-[360px] object-cover">
                    </div>
                    <div id="reader-loading" class="mb-4 hidden">
                        <div class="reader-skeleton reader-skeleton-block h-64 mb-4"></div>
                        <div class="reader-skeleton reader-skeleton-line w-3/4"></div>
                        <div class="reader-skeleton reader-skeleton-line w-full"></div>
                        <div class="reader-skeleton reader-skeleton-line w-5/6"></div>
                        <div class="reader-skeleton reader-skeleton-line w-2/3"></div>
                    </div>
                    <div id="reader-content" class="reader-content"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ru';
        let currentTheme = 'light';
        
        let allNewsItems = []; 
        let filteredNewsItems = [];
        let currentRenderIndex = 0;
        const RENDER_BATCH_SIZE = 9;

        const dict = {
            ru: {
                feedTitle: 'Лента новостей',
                footer: `© ${new Date().getFullYear()} REALLY?. Собственный сервер API.`,
                loading: 'Загрузка...',
                readMore: 'Читать',
                error: 'Ошибка загрузки. Обновите страницу.',
                filterAll: 'Все', filterToday: 'Сегодня', filterYesterday: 'Вчера',
                empty: 'За этот период новостей пока нет.',
                btnLoadMore: 'Показать еще ↓',
                noMoreNews: 'На сегодня новостей больше нет',
                back: 'Назад',
                source: 'Источник',
                loadingArticle: 'Загрузка статьи...',
                readOnSource: 'Читать на первоисточнике',
                articleUnavailable: 'Не удалось загрузить полный текст. Ниже краткое описание.'
            },
            en: {
                feedTitle: 'News Feed',
                footer: `© ${new Date().getFullYear()} REALLY?. Custom API Server.`,
                loading: 'Loading...',
                readMore: 'Read',
                error: 'Loading error. Please refresh.',
                filterAll: 'All', filterToday: 'Today', filterYesterday: 'Yesterday',
                empty: 'No news found for this period.',
                btnLoadMore: 'Load more ↓',
                noMoreNews: 'No more news for today',
                back: 'Back',
                source: 'Source',
                loadingArticle: 'Loading article...',
                readOnSource: 'Read on source',
                articleUnavailable: 'Could not load full text. Summary is shown below.'
            }
        };

        const articleContentCache = new Map();

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle-btn');
            if (currentTheme === 'dark') {
                currentTheme = 'light';
                body.classList.add('theme-light');
                btn.innerText = '☀️';
            } else {
                currentTheme = 'dark';
                body.classList.remove('theme-light');
                btn.innerText = '🌙';
            }
        }

        function changeLanguage(lang) {
            if (currentLang === lang) return;
            const activeFilter = getActiveFilterType();
            currentLang = lang;
            const btnRu = document.getElementById('btn-ru');
            const btnEn = document.getElementById('btn-en');

            if(lang === 'ru') {
                btnRu.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent';
                btnEn.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent';
            } else {
                btnEn.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all bg-accent';
                btnRu.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all text-muted hover:text-[var(--text-main)] bg-transparent';
            }
            updateTexts();
            fetchNews(activeFilter);
        }

        function getActiveFilterType() {
            const activeBtn = document.querySelector('.filter-btn.active');
            if (!activeBtn || !activeBtn.id) return 'all';
            return activeBtn.id.replace('filter-', '') || 'all';
        }

        function updateTexts() {
            const t = dict[currentLang];
            document.getElementById('txt-feed-title').innerHTML = `<span class="w-2 h-6 bg-accent rounded-full transition-colors"></span> ${t.feedTitle}`;
            document.getElementById('txt-footer').innerText = t.footer;
            document.getElementById('filter-all').innerText = t.filterAll;
            document.getElementById('filter-today').innerText = t.filterToday;
            document.getElementById('filter-yesterday').innerText = t.filterYesterday;
            document.getElementById('reader-btn-back').innerText = t.back;
            document.getElementById('reader-source-link').innerText = `${t.source} ↗`;
            document.getElementById('reader-loading').setAttribute('aria-label', t.loadingArticle);
            
            const loadBtn = document.getElementById('btn-load-more');
            if(loadBtn.innerText !== dict['ru'].noMoreNews && loadBtn.innerText !== dict['en'].noMoreNews) {
                loadBtn.innerText = t.btnLoadMore;
            }
        }

        function handleImageError(imgElement) {
            imgElement.style.display = 'none';
            if(imgElement.nextElementSibling) imgElement.nextElementSibling.style.display = 'flex';
        }

        function escapeHTML(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function safeHttpUrl(url, fallback = '#') {
            try {
                const parsed = new URL(String(url || '').trim());
                if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
                    return parsed.href;
                }
            } catch (e) {
                return fallback;
            }
            return fallback;
        }

        function parseAndFormatDate(dateString) {
            try {
                const date = new Date(dateString || Date.now());
                if (isNaN(date.getTime())) return { label: "Только что", category: 'today', timestamp: Date.now() };

                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                const isToday = date.toDateString() === today.toDateString();
                const isYesterday = date.toDateString() === yesterday.toDateString();
                
                const locale = currentLang === 'ru' ? 'ru-RU' : 'en-US';
                const timeOpts = { hour: '2-digit', minute: '2-digit', hour12: currentLang === 'en' };
                const time = date.toLocaleTimeString(locale, timeOpts);
                
                if (isToday) return { label: `${dict[currentLang].filterToday}, ${time}`, category: 'today', timestamp: date.getTime() };
                if (isYesterday) return { label: `${dict[currentLang].filterYesterday}, ${time}`, category: 'yesterday', timestamp: date.getTime() };
                
                const dateSeparator = currentLang === 'ru' ? 'в' : 'at';
                return { label: `${date.toLocaleDateString(locale)} ${dateSeparator} ${time}`, category: 'older', timestamp: date.getTime() };
            } catch (e) {
                return { label: "Только что", category: 'today', timestamp: Date.now() };
            }
        }

        function sanitizeArticleHtml(html) {
            const root = document.createElement('div');
            root.innerHTML = String(html || '');

            root.querySelectorAll('script, style, iframe, form, nav, header, footer, aside, noscript, object, embed').forEach(el => el.remove());

            root.querySelectorAll('*').forEach(el => {
                [...el.attributes].forEach(attr => {
                    const name = attr.name.toLowerCase();
                    const value = String(attr.value || '');
                    if (name.startsWith('on')) el.removeAttribute(attr.name);
                    if ((name === 'href' || name === 'src') && /^javascript:/i.test(value)) el.removeAttribute(attr.name);
                });
            });

            root.querySelectorAll('a[href]').forEach(a => {
                a.setAttribute('target', '_blank');
                a.setAttribute('rel', 'noopener noreferrer');
            });

            return root.innerHTML;
        }

        async function openReader(link) {
            const reader = document.getElementById('article-reader');
            const content = document.getElementById('reader-content');
            const loading = document.getElementById('reader-loading');
            const titleEl = document.getElementById('reader-title');
            const dateEl = document.getElementById('reader-date');
            const sourceLinkEl = document.getElementById('reader-source-link');
            const imageWrap = document.getElementById('reader-image-wrap');
            const imageEl = document.getElementById('reader-image');

            const normalizedLink = safeHttpUrl(link, '#');
            const item = allNewsItems.find(n => safeHttpUrl(n.link, '#') === normalizedLink);
            if (!item) return;

            titleEl.innerText = item.title || '';
            dateEl.innerText = item.dateLabel || '';
            sourceLinkEl.href = normalizedLink;

            if (item.img) {
                imageEl.src = safeHttpUrl(item.img, '');
                imageWrap.classList.remove('hidden');
            } else {
                imageWrap.classList.add('hidden');
                imageEl.src = '';
            }

            content.innerHTML = `<p>${escapeHTML(item.desc || '')}</p>`;
            loading.classList.remove('hidden');
            reader.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            if (articleContentCache.has(normalizedLink)) {
                content.innerHTML = articleContentCache.get(normalizedLink);
                loading.classList.add('hidden');
                return;
            }

            try {
                const resp = await fetchJsonWithTimeout(`/api/article?url=${encodeURIComponent(normalizedLink)}`, 9000);
                if (!resp.ok) throw new Error('article request failed');

                const payload = await resp.json();
                const sanitized = sanitizeArticleHtml(payload.content || '');
                if (!sanitized.trim()) throw new Error('empty article');

                articleContentCache.set(normalizedLink, sanitized);
                content.innerHTML = sanitized;
            } catch (e) {
                content.innerHTML = `<p class="text-sm text-muted">${escapeHTML(dict[currentLang].articleUnavailable)}</p><p>${escapeHTML(item.desc || '')}</p>`;
            } finally {
                loading.classList.add('hidden');
            }
        }

        function closeReader() {
            document.getElementById('article-reader').classList.add('hidden');
            document.body.style.overflow = '';
        }

        async function fetchJsonWithTimeout(url, timeoutMs = 4500) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { signal: controller.signal });
                return response;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        async function fetchNews(filterType = 'all') {
            const loader = document.getElementById('loader-list');
            const grid = document.getElementById('news-grid');
            const loadContainer = document.getElementById('load-more-container');

            loader.classList.remove('hidden');
            loader.innerText = dict[currentLang].loading;
            grid.innerHTML = '';
            loadContainer.classList.add('hidden');
            allNewsItems = [];

            const cacheKey = `really_news_${currentLang}`;
            try {
                const cachedRaw = localStorage.getItem(cacheKey);
                if (cachedRaw) {
                    const cachedItems = JSON.parse(cachedRaw);
                    if (Array.isArray(cachedItems) && cachedItems.length > 0) {
                        allNewsItems = cachedItems;
                        applyFilter(filterType);
                        loader.innerText = currentLang === 'ru' ? 'Обновление ленты...' : 'Refreshing feed...';
                        loader.classList.remove('hidden');
                    }
                }
            } catch (e) {
                // Ignore localStorage/JSON errors and continue with network fetch.
            }

            try {
                const seenLinks = new Set();
                allNewsItems = [];

                const collectItems = (payload) => {
                    (Array.isArray(payload.items) ? payload.items : []).forEach(item => {
                        if (!item || !item.link || seenLinks.has(item.link)) return;
                        seenLinks.add(item.link);
                        const dateInfo = parseAndFormatDate(item.pubDate);
                        allNewsItems.push({
                            ...item,
                            dateLabel: dateInfo.label,
                            category: dateInfo.category,
                            timestamp: dateInfo.timestamp
                        });
                    });
                };

                const response = await fetchJsonWithTimeout(`/api/news?lang=${currentLang}`);
                const payload = response.ok ? await response.json() : { items: [] };
                collectItems(payload);

                if (allNewsItems.length === 0) throw new Error("Лента пуста");

                allNewsItems.sort((a, b) => b.timestamp - a.timestamp);
                try {
                    localStorage.setItem(cacheKey, JSON.stringify(allNewsItems.slice(0, 50)));
                } catch (e) {
                    // Ignore quota/private mode issues.
                }
                applyFilter(filterType);
                loader.classList.add('hidden');

            } catch (error) {
                console.error("Ошибка сети:", error);
                if (allNewsItems.length === 0) {
                    loader.classList.remove('hidden');
                    loader.innerText = dict[currentLang].error;
                }
            } finally {
                if (allNewsItems.length > 0) {
                    loader.classList.add('hidden');
                }
            }
        }

        function applyFilter(filterType) {
            if (allNewsItems.length === 0) return; 
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${filterType}`).classList.add('active');

            filteredNewsItems = filterType === 'all' ? [...allNewsItems] : allNewsItems.filter(item => item.category === filterType);

            document.getElementById('loader-list').classList.add('hidden');
            document.getElementById('news-grid').innerHTML = '';
            currentRenderIndex = 0;

            if (filteredNewsItems.length === 0) {
                document.getElementById('loader-list').classList.remove('hidden');
                document.getElementById('loader-list').innerText = dict[currentLang].empty;
                document.getElementById('load-more-container').classList.add('hidden');
                return;
            }
            
            document.getElementById('btn-load-more').innerText = dict[currentLang].btnLoadMore;
            document.getElementById('btn-load-more').disabled = false;
            document.getElementById('btn-load-more').classList.remove('opacity-50', 'cursor-not-allowed');
            
            renderNextBatch();
        }

        function renderNextBatch() {
            if (currentRenderIndex >= filteredNewsItems.length) return;

            const grid = document.getElementById('news-grid');
            const batch = filteredNewsItems.slice(currentRenderIndex, currentRenderIndex + RENDER_BATCH_SIZE);
            const htmlParts = [];
            
            batch.forEach((news, i) => {
                const safeTitle = escapeHTML(news.title);
                const safeDesc = escapeHTML(news.desc);
                const safeDateLabel = escapeHTML(news.dateLabel);
                const safeLink = escapeHTML(safeHttpUrl(news.link, '#'));
                const safeImg = escapeHTML(safeHttpUrl(news.img, ''));

                const imgBlock = safeImg
                    ? `<img src="${safeImg}" onerror="handleImageError(this)" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                       <div class="w-full h-full placeholder-bg flex items-center justify-center text-xs font-bold text-[var(--text-main)] code-font uppercase" style="display:none;">[ NO PHOTO ]</div>`
                    : `<div class="w-full h-full placeholder-bg flex items-center justify-center text-xs font-bold text-[var(--text-main)] code-font uppercase">[ NO PHOTO ]</div>`;

                htmlParts.push(`
                    <article class="tech-card app-card rounded-2xl overflow-hidden group cursor-pointer" style="animation-delay: ${(i % RENDER_BATCH_SIZE) * 50}ms" data-link="${safeLink}" onclick="openReader(this.dataset.link)">
                        <div class="flex flex-col h-full cursor-pointer outline-none block">
                            <div class="h-48 overflow-hidden border-b border-custom relative">
                                ${imgBlock}
                                <div class="absolute top-3 left-3 news-date-badge backdrop-blur-md px-2.5 py-1 rounded-md text-[10px] font-bold code-font shadow-lg">
                                    ${safeDateLabel}
                                </div>
                            </div>
                            <div class="p-6 space-y-3 flex-grow">
                                <h3 class="text-base font-bold leading-snug group-hover:text-[var(--text-muted)] transition-colors">${safeTitle}</h3>
                                <p class="text-sm text-muted leading-relaxed">${safeDesc}</p>
                            </div>
                            <div class="p-6 pt-0 flex items-center justify-between text-xs border-t border-custom/30 mt-4 pt-4">
                                <span class="text-muted code-font">REALLY? NEWS</span>
                                <span class="text-[var(--text-main)] font-bold flex items-center gap-1 bg-accent/20 px-3 py-1.5 rounded-lg group-hover:bg-accent group-hover:text-[var(--btn-text)] transition-colors">${dict[currentLang].readMore} →</span>
                            </div>
                        </div>
                    </article>
                `);
            });

            grid.insertAdjacentHTML('beforeend', htmlParts.join(''));

            currentRenderIndex += RENDER_BATCH_SIZE;
            
            const loadContainer = document.getElementById('load-more-container');
            const loadBtn = document.getElementById('btn-load-more');
            
            if (currentRenderIndex >= filteredNewsItems.length) {
                loadContainer.classList.remove('hidden');
                loadBtn.innerText = dict[currentLang].noMoreNews;
                loadBtn.disabled = true;
                loadBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                loadContainer.classList.remove('hidden');
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            updateTexts();
            fetchNews();

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') closeReader();
            });
        });
    </script>
</body>
</html>
